<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Weekly Meta ad creative breakdowns, testing ideas, and CAC diagnosis for ecommerce teams.">
  <meta property="og:title" content="The Meta Ads Newsletter for Ecommerce Teams | Macedo Marketing">
  <meta property="og:description" content="Real creative examples, the thinking behind them, and what to test next.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://www.macedomarketing.com/newsletter/">
  <title>Macedo Marketing Newsletter | Meta Ads for Ecommerce Teams</title>
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0B0B0B; --surface:#151515; --text:#F8F6F2; --muted:#AAA6A1; --accent:#F66745; --line:rgba(255,255,255,.1); }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { min-width:320px; overflow-x:hidden; background:var(--bg); color:var(--text); font-family:'Nunito Sans',system-ui,sans-serif; }
    body::before { content:''; position:fixed; z-index:-1; inset:0; background:radial-gradient(circle at 50% 0,rgba(246,103,69,.15),transparent 38%),linear-gradient(180deg,#130D0B 0,#0B0B0B 43%); }
    .shell { width:min(100% - 40px,1120px); margin:0 auto; }
    header { display:flex; align-items:center; justify-content:space-between; padding:28px 0; }
    .logo { display:block; width:178px; height:auto; }
    .archive { color:#C7C3BE; font-size:13px; font-weight:800; text-decoration:none; }
    .archive:hover { color:var(--accent); }
    main { padding:72px 0 40px; text-align:center; }
    .eyebrow { display:inline-flex; align-items:center; gap:9px; margin-bottom:24px; color:var(--accent); font-size:11px; font-weight:900; letter-spacing:1.7px; text-transform:uppercase; }
    .eyebrow::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 16px rgba(246,103,69,.8); }
    h1 { max-width:870px; margin:0 auto; font-size:clamp(48px,7vw,86px); line-height:.98; letter-spacing:-3.6px; }
    h1 span { background:linear-gradient(90deg,#F66745,#FFC12E); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .subhead { max-width:690px; margin:26px auto 38px; color:#B9B5B0; font-size:18px; line-height:1.65; }
    .signup { display:grid; grid-template-columns:minmax(0,.8fr) minmax(0,1.15fr) auto; gap:10px; width:min(100%,790px); margin:0 auto; padding:10px; border:1px solid var(--line); border-radius:15px; background:rgba(21,21,21,.9); box-shadow:0 22px 70px rgba(0,0,0,.4); }
    .signup input { min-width:0; min-height:54px; border:1px solid rgba(255,255,255,.11); border-radius:9px; outline:0; background:#202020; color:#fff; padding:0 16px; font:700 14px 'Nunito Sans',sans-serif; }
    .signup input::placeholder { color:#817E7A; }
    .signup input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(246,103,69,.12); }
    .signup button { min-height:54px; border:0; border-radius:9px; padding:0 24px; cursor:pointer; background:var(--accent); color:#fff; font:900 12px 'Nunito Sans',sans-serif; letter-spacing:.8px; text-transform:uppercase; box-shadow:0 10px 30px rgba(246,103,69,.26); white-space:nowrap; }
    .privacy { display:block; margin-top:13px; color:#716E6A; font-size:11px; }
    .creative-stage { position:relative; width:min(100%,980px); height:470px; margin:74px auto 10px; overflow:hidden; }
    .creative-card { position:absolute; top:28px; left:50%; width:250px; aspect-ratio:1; overflow:hidden; border:6px solid #202020; border-radius:19px; background:#1A1A1A; box-shadow:0 24px 55px rgba(0,0,0,.5); transform-origin:center bottom; }
    .creative-card img { width:100%; height:100%; object-fit:cover; display:block; }
    .c1 { transform:translateX(-190%) rotate(-10deg) translateY(60px); filter:blur(2.4px) saturate(.7); opacity:.58; }
    .c2 { transform:translateX(-132%) rotate(-6deg) translateY(28px); filter:blur(.7px); opacity:.82; }
    .c3 { transform:translateX(-73%) rotate(-2.5deg); z-index:2; }
    .c4 { transform:translateX(-27%) rotate(2.5deg); z-index:3; }
    .c5 { transform:translateX(32%) rotate(6deg) translateY(28px); filter:blur(.7px); opacity:.82; }
    .c6 { transform:translateX(90%) rotate(10deg) translateY(60px); filter:blur(2.4px) saturate(.7); opacity:.58; }
    .blur-lock { position:absolute; z-index:6; inset:auto 0 0; height:190px; display:grid; place-items:end center; padding-bottom:38px; background:linear-gradient(180deg,transparent 0,rgba(11,11,11,.4) 20%,rgba(11,11,11,.96) 82%); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); -webkit-mask-image:linear-gradient(transparent,#000 35%); mask-image:linear-gradient(transparent,#000 35%); }
    .lock-label { display:flex; align-items:center; gap:9px; padding:11px 16px; border:1px solid rgba(255,255,255,.13); border-radius:99px; background:rgba(20,20,20,.9); color:#fff; font-size:10px; font-weight:900; letter-spacing:1px; text-transform:uppercase; box-shadow:0 12px 30px rgba(0,0,0,.4); }
    .lock-label svg { width:14px; height:14px; color:var(--accent); }
    footer { display:flex; align-items:center; justify-content:center; padding:34px 0; border-top:1px solid rgba(255,255,255,.06); color:#666; font-size:11px; }
    @media (max-width:800px) {
      main { padding-top:56px; }
      h1 { letter-spacing:-2.4px; }
      .signup { grid-template-columns:1fr 1fr; }
      .signup button { grid-column:1/-1; }
      .creative-stage { height:420px; margin-top:60px; }
      .creative-card { width:225px; }
    }
    @media (max-width:560px) {
      .shell { width:min(100% - 32px,1120px); }
      header { padding:22px 0; }
      .logo { width:150px; }
      .archive { font-size:12px; }
      main { padding-top:46px; }
      h1 { font-size:45px; letter-spacing:-1.8px; }
      .subhead { margin:23px auto 30px; font-size:16px; }
      .signup { grid-template-columns:1fr; padding:9px; }
      .signup button { grid-column:auto; }
      .creative-stage { width:calc(100% + 32px); margin-left:-16px; height:365px; margin-top:52px; }
      .creative-card { width:190px; top:20px; border-width:5px; border-radius:15px; }
      .c1 { transform:translateX(-176%) rotate(-10deg) translateY(50px); }
      .c2 { transform:translateX(-125%) rotate(-6deg) translateY(25px); }
      .c3 { transform:translateX(-75%) rotate(-2.5deg); }
      .c4 { transform:translateX(-25%) rotate(2.5deg); }
      .c5 { transform:translateX(25%) rotate(6deg) translateY(25px); }
      .c6 { transform:translateX(76%) rotate(10deg) translateY(50px); }
      .blur-lock { height:155px; padding-bottom:26px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <a href="https://www.macedomarketing.com" aria-label="Macedo Marketing home"><img class="logo" src="../logo-svg-3.svg" alt="Macedo Marketing"></a>
      <a class="archive" href="https://macedomarketing.beehiiv.com" target="_blank" rel="noopener">Read the archive</a>
    </header>
    <main>
      <div class="eyebrow">Free weekly newsletter</div>
      <h1>The Meta ads newsletter for <span>ecommerce teams.</span></h1>
      <p class="subhead">Every week: real creative examples, the hook and angle behind them, what to test next, and how to diagnose rising CAC.</p>
      <form class="signup" action="https://macedomarketing.beehiiv.com/create" method="post">
        <input type="hidden" name="redirect_path" value="/">
        <input type="hidden" name="sent_from_orchid" value="true">
        <input type="hidden" name="fallback_path" value="/subscribe">
        <input type="hidden" name="nectar_signup_url" value="https://macedomarketing.beehiiv.com/subscribe?utm_source=macedo_site&amp;utm_medium=landing_page&amp;utm_campaign=newsletter_subscribe">
        <input type="hidden" name="double_opt" value="false">
        <input type="hidden" name="trigger_redirect" value="false">
        <input type="text" name="first_name" autocomplete="given-name" required placeholder="First name" aria-label="First name">
        <input type="email" name="email" autocomplete="email" required placeholder="Email address" aria-label="Email address">
        <button type="submit">Send me the next breakdown</button>
      </form>
      <span class="privacy">Free. No spam. Unsubscribe anytime.</span>
      <div class="creative-stage" aria-label="Preview of Macedo Marketing ecommerce ad creatives">
        <div class="creative-card c1"><img src="./assets/creatives/12-urgency.jpg" alt="Ecommerce ad creative preview"></div>
        <div class="creative-card c2"><img src="./assets/creatives/08-bandana.jpg" alt="Ecommerce product ad creative preview"></div>
        <div class="creative-card c3"><img src="./assets/creatives/03-moment-health.jpg" alt="Health product ad creative preview"></div>
        <div class="creative-card c4"><img src="./assets/creatives/09-before-after.jpg" alt="Digital product ad creative preview"></div>
        <div class="creative-card c5"><img src="./assets/creatives/10-slimming.jpg" alt="Wellness product ad creative preview"></div>
        <div class="creative-card c6"><img src="./assets/creatives/01-comparison.jpg" alt="Digital product comparison ad preview"></div>
        <div class="blur-lock" aria-hidden="true">
          <div class="lock-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>Real creative breakdowns inside</div>
        </div>
      </div>
    </main>
    <footer>© 2026 Macedo Marketing</footer>
  </div>
</body>
</html>
